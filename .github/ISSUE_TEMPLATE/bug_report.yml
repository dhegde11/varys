name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "**Note:** Do not include your `ANTHROPIC_API_KEY` in this report."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The exact `python varys.py ...` command or Claude Code invocation.
      render: shell
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      render: shell
    validations:
      required: false

  - type: input
    id: skill
    attributes:
      label: Which skill?
      placeholder: "e.g. profile-health-system"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11"
    validations:
      required: false
