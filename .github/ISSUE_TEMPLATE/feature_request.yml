name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - varys.py (CLI / batch runner)
        - Skill prompt (profile-health-system)
        - Skill prompt (profile-health-it-vendor)
        - Skill prompt (discover-health-it-vendor)
        - Documentation
        - Other
    validations:
      required: true
